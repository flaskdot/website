        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: var(--forbes-black); color: white; padding: 10px 5%; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .top-bar a { color: white; text-decoration: none; }
        .main-header { background: var(--white); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .logo-text { font-size: 2.8rem; font-weight: 900; color: var(--forbes-black); text-decoration: none; font-family: serif; letter-spacing: -2px; }
        .btn-red { background: var(--forbes-red); color: white; padding: 10px 25px; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .sub-nav { background: var(--white); display: flex; justify-content: center; gap: 30px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .sub-nav a { color: #444; text-decoration: none; font-weight: 500; }
        .hero-container { flex: 1; padding: 60px 5%; display: flex; justify-content: center; align-items: center; }
        .glass-hero { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.6); padding: 60px; border-radius: 30px; display: flex; align-items: center; width: 100%; max-width: 1200px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05); }
        .hero-content { flex: 1; }
        .hero-content h1 { font-size: 3.5rem; color: var(--forbes-blue); margin-bottom: 20px; font-weight: 900; }
        .hero-list { list-style: none; font-size: 1.2rem; color: #555; margin-bottom: 30px; }
        .hero-list li { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .hero-list li::before { content: "✓"; color: var(--forbes-blue); font-weight: bold; }
        .hero-image { flex: 1; text-align: left; }
        .hero-image img { max-width: 100%; height: auto; border-radius: 20px; }
        footer { background: var(--white); padding: 30px; text-align: center; color: #999; border-top: 1px solid #eee; }
    </style>
</head>
