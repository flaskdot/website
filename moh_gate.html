<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة وزارة الصحة | آفاق</title>
    <style>
        :root { 
            --eggplant: #4B0082; /* لون باذنجاني عميق */
            --gold: #D4AF37; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--eggplant); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white;
            overflow: hidden;
        }

        .gate-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .moh-logo {
            width: 150px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 1rem; color: #ccc; margin-bottom: 30px; }

        .submit-btn {
            display: inline-block;
            background-color: white;
            color: var(--eggplant);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            background-color: var(--gold);
            color: white;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="gate-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Palestine_MOH_Logo.png/600px-Palestine_MOH_Logo.png" alt="شعار وزارة الصحة" class="moh-logo">
        
        <h1>وزارة الصحة الفلسطينية</h1>
        <p>الخدمات الإلكترونية - بوابة تقديم الطلبات</p>

        <a href="https://www.sehatty.ps/public/citizen/citizen/referral#" target="_blank" class="submit-btn">
            تقديم الطلب
        </a>

        <a href="application.html" class="back-link">⬅ عودة للخدمات</a>
    </div>

</body>
</html>
